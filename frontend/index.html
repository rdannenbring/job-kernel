<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Automatically tailor your resume to match job descriptions with AI-powered optimization"
    />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0a0c12",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; }
        .glass-card:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(37, 106, 244, 0.4); }
        .glass-row { background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s ease; }
        .glass-row:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-1px); }
        
        :root[data-theme="light"] .glass-panel { background: rgba(255, 255, 255, 0.95); border-color: rgba(0, 0, 0, 0.08); box-shadow: var(--shadow-lg); }
        :root[data-theme="light"] .glass-card { background: #ffffff; border-color: rgba(15, 23, 42, 0.12); box-shadow: var(--shadow-md); }
        :root[data-theme="light"] .glass-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        :root[data-theme="light"] .glass-row { background: #ffffff; border-bottom-color: rgba(0, 0, 0, 0.05); }
        :root[data-theme="light"] .glass-row:hover { background: rgba(0, 0, 0, 0.01); }

        .bg-glow { background: radial-gradient(circle at 50% 50%, rgba(37, 106, 244, 0.15) 0%, transparent 50%); }
        .bg-glow-secondary { background: radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%); }
    </style>
    <title>JobKernel - AI-Powered Job Application Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
